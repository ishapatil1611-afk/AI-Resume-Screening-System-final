<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screening</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c9a7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            width: 450px;
            text-align: center;
            box-shadow: 0px 10px 40px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
            color: #ddd;
        }

        input[type="file"] {
            margin-top: 10px;
            margin-bottom: 20px;
            color: white;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(to right, #00c9a7, #00b894);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="icon">📊</div>

    <h1>AI Resume Screening</h1>
    <p>Upload resumes and find the best candidate instantly 🚀</p>

    <form action="/result" method="post" enctype="multipart/form-data">

        <label>📁 Upload Resume Dataset (CSV)</label><br>
        <input type="file" name="file" required>

        <label>🧠 Enter Required Skills</label>
        <textarea name="skills" placeholder="Example: python, sql, machine learning"></textarea>

        <button type="submit">Analyze Candidates 🚀</button>

    </form>

</div>

</body>
</html>
